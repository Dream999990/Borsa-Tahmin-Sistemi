<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Borsa Tahmin Sistemi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #121212; color: white; }
        .card { background-color: #1e1e1e; color: white; border: 1px solid #333; }
    </style>
</head>
<body class="container py-5">
    <h1 class="text-center mb-5">🚀 Borsa Duygu Analizi</h1>
    
    <div class="row justify-content-center">
        <div class="col-md-6">
            <form method="POST" class="d-flex gap-2 mb-4">
                {% csrf_token %}
                <input type="text" name="ticker" class="form-control" placeholder="Hisse Kodu (Örn: NVDA)" required>
                <button type="submit" class="btn btn-primary">Analiz Et</button>
            </form>
        </div>
    </div>

    {% if ticker %}
    <div class="row">
        <div class="col-md-4">
            <div class="card p-3 text-center">
                <h3>Duygu Skoru</h3>
                <h1 class="display-4 {% if sentiment > 0 %}text-success{% else %}text-danger{% endif %}">
                    {{ sentiment }}
                </h1>
                <p>(-1: Çok Negatif, +1: Çok Pozitif)</p>
            </div>
        </div>

        <div class="col-md-8">
            <div class="card p-3">
                <h3>Son 10 Günlük Veri ({{ ticker }})</h3>
                {{ stock_table|safe }}
            </div>
        </div>
    </div>
    {% endif %}
</body>
</html>
